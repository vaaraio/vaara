apiVersion: v1
kind: Service
metadata:
  name: {{ include "vaara.fullname" . }}
  labels:
    {{- include "vaara.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    {{- include "vaara.selectorLabels" . | nindent 4 }}
