replicaCount: 1

image:
  repository: ghcr.io/vaaraio/vaara
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: vaara.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  mountPath: /data

vaara:
  logLevel: INFO
  # Tenant configuration
  tenantId: "default"
  # Policy directory (mount a ConfigMap here)
  policyDir: ""
  # Signing key secret name (must contain VAARA_SIGNING_KEY)
  signingKeySecret: ""

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
