name: Release

on:
  push:
    tags:
      - 'v*'

permissions: read-all

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC for SLSA provenance signing
      attestations: write   # store attestations on the workflow run
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install --require-hashes -r .github/requirements-build.txt

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate SLSA build provenance
        # Emits a sigstore-backed attestation for each built artefact.
        # The attestation binds the workflow + commit SHA + builder identity
        # to the wheel/sdist digests, so downstream verifiers (slsa-verifier,
        # gh attestation verify) can prove an artefact came from this repo.
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: 'dist/*'

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/vaara/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI with attestations
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true
          skip-existing: true

  github-release:
    name: Sign and attach to GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout (for CHANGELOG)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Sign distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ "^## \\[" ver "\\]") in_section = 1
            }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION"
            exit 1
          fi
          echo "Extracted $(wc -l < release-notes.md) lines for v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sigstore.json
          body_path: release-notes.md
          fail_on_unmatched_files: true

  publish-npm:
    name: Publish TypeScript client to npm
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    permissions:
      contents: read
      id-token: write  # required for npm provenance
    defaults:
      run:
        working-directory: clients/ts
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6.0.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install (npm ci)
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test
        run: node --test test/*.test.mjs

      - name: Sync client version to the released tag
        # The npm client is versioned in clients/ts/package.json, decoupled from
        # the Python package. A missed manual bump (as in v1.26.0) desyncs the
        # npm client from the release. Rewrite the version from the tag here, the
        # same way the MCP manifests are synced below, so it can no longer drift.
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Set @vaara/client version to ${VERSION}"

      - name: Publish to npm with provenance
        run: |
          set -euo pipefail
          pkg="$(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")"
          if npm view "$pkg" version > /dev/null 2>&1; then
            echo "Already published: $pkg"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-registry:
    name: Publish manifests to the MCP Registry
    # Gate on PyPI plus the GitHub Release. Both manifests declare
    # registryType pypi, so the package must be live on PyPI before the
    # registry will accept them. publish-npm is intentionally NOT a
    # dependency: it is gated behind NPM_PUBLISH_ENABLED and a skipped
    # needs-dependency would skip this job too.
    needs: [publish-pypi, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read      # checkout the server.json manifests
      id-token: write     # OIDC login to the MCP Registry, no stored secret
    env:
      # Pin the publisher binary. "latest" risks an "invalid audience" auth
      # failure if a new registry deployment expects a newer client, so we
      # pin explicitly and bump on purpose. See the registry release page.
      MCP_PUBLISHER_VERSION: v1.7.9
    steps:
      - name: Checkout (for server.json manifests)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install mcp-publisher CLI
        run: |
          set -euo pipefail
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          url="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_${os}_${arch}.tar.gz"
          echo "Downloading mcp-publisher from ${url}"
          curl -fsSL "$url" | tar xz mcp-publisher
          ./mcp-publisher --version || true

      - name: Authenticate to the MCP Registry (GitHub OIDC)
        # github-oidc uses the job's id-token, so no PAT or secret is needed.
        # Requires the io.github.vaaraio/* namespace, which authenticates via
        # the GitHub identity of this repository.
        run: ./mcp-publisher login github-oidc

      - name: Sync manifest versions to the released tag
        # The registry publishes whatever version is committed in the manifests,
        # and nothing else bumps them on release. Rewrite both to the tag here so
        # a forgotten manual manifest bump cannot make the publish + assertion
        # below fail (the recurring failure mode for v1.17.0/v1.18.0). jq is
        # pre-installed on ubuntu-latest runners.
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          for manifest in server.json server-vaara-server.json; do
            tmp="$(mktemp)"
            jq --arg v "$VERSION" '.version = $v | (.packages[]?.version) |= $v' "$manifest" > "$tmp"
            mv "$tmp" "$manifest"
            echo "Set ${manifest} version to ${VERSION}"
          done

      - name: Publish both manifests
        # The publish subcommand takes the manifest path as a positional arg
        # (defaults to ./server.json). We publish both listings. A version
        # already on the registry returns a non-zero "already exists" error,
        # treated as success here; the assertion below is the real gate and
        # fails the job if the live version does not match the tag.
        run: |
          set -uo pipefail
          publish_one() {
            manifest="$1"
            echo "::group::mcp-publisher publish ${manifest}"
            out="$(./mcp-publisher publish "$manifest" 2>&1)" && rc=0 || rc=$?
            echo "$out"
            echo "::endgroup::"
            if [ "$rc" -ne 0 ]; then
              if echo "$out" | grep -qiE 'already exists|already published|duplicate'; then
                echo "Version already present on the registry for ${manifest}; treating as success."
                return 0
              fi
              echo "::error::Publishing ${manifest} failed (exit ${rc})."
              return "$rc"
            fi
          }
          publish_one server.json
          publish_one server-vaara-server.json

      - name: Assert registry version matches the released tag
        # Loud post-publish gate. Strip a leading v from the tag and confirm
        # the latest active version on the registry for BOTH listings equals it.
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          EXPECTED="${RELEASE_TAG#v}"
          echo "Expected version (from tag ${RELEASE_TAG}): ${EXPECTED}"
          python3 - "$EXPECTED" <<'PY'
          import json, sys, time, urllib.error, urllib.request

          expected = sys.argv[1]
          names = ["io.github.vaaraio/vaara", "io.github.vaaraio/vaara-server"]
          OFFICIAL = "io.modelcontextprotocol.registry/official"
          BASE = "https://registry.modelcontextprotocol.io/v0/servers"

          def latest_active(name):
              # Query per name with version=latest. The unfiltered search list is
              # paginated and does not reliably carry every server's active entry,
              # so a multi-listing repo needs one request per name.
              url = f"{BASE}?search={name}&version=latest"
              try:
                  with urllib.request.urlopen(url, timeout=30) as fh:
                      data = json.load(fh)
              except (urllib.error.URLError, TimeoutError) as exc:
                  # A transient read timeout or 5xx must not abort the publish gate.
                  # Treat it as a miss so the surrounding poll retries.
                  print(f"WARN {name}: registry read failed ({exc!r}); will retry")
                  return None
              for entry in data.get("servers", data.get("data", [])):
                  server = entry.get("server", entry)
                  if server.get("name") != name:
                      continue
                  meta = (entry.get("_meta") or {}).get(OFFICIAL, {})
                  if meta.get("isLatest") and meta.get("status") == "active":
                      return server.get("version")
              return None

          failed = []
          for name in names:
              # Read-after-write on the registry can lag a publish by a few
              # seconds, so poll before giving up.
              latest = None
              for _ in range(10):
                  latest = latest_active(name)
                  if latest == expected:
                      print(f"OK   {name}: latest active version {latest} matches tag {expected}")
                      break
                  time.sleep(6)
              else:
                  print(f"FAIL {name}: expected {expected}, registry latest active is {latest!r}")
                  failed.append(name)

          if failed:
              print("::error::MCP Registry latest version does not match the released tag.")
              sys.exit(1)
          print("MCP Registry is in sync with tag", expected)
          PY
