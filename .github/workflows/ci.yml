name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned deps
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Install Vaara (editable, no deps)
        run: pip install -e . --no-deps

      - name: Install server extra (fastapi, uvicorn, httpx) for HTTP transport tests
        run: pip install 'fastapi>=0.110' 'uvicorn>=0.27' 'httpx>=0.27'

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q

  typecheck:
    name: Type check (mypy strict set)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Install mypy
        run: pip install mypy==1.20.2

      # Strict set only (vaara.policy.*, per [[tool.mypy.overrides]] in
      # pyproject.toml). Non-zero exit fails the build. Widen the set by
      # adding modules to the strict override block as they are cleaned up.
      - name: mypy
        run: mypy src/vaara/policy/

  preflight:
    name: Pre-release smoke test (wheel + classifier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'

      - name: Run preflight smoke test
        run: ./scripts/preflight.sh
