# Secret-scanning exclusions for adversarial test corpus.
#
# tests/adversarial/generated/ contains LLM-generated synthetic adversarial
# tool calls used to evaluate Vaara's runtime classifier. By design, these
# entries simulate exfiltration patterns (fake bot tokens, fake DB URIs,
# fake API keys) so the classifier learns to flag them. Synthetic strings
# can pattern-match GitHub's secret-scanning regexes despite carrying no
# real credentials. Excluding the corpus path prevents future false
# positives while keeping scanning active everywhere else.
paths-ignore:
  - "tests/adversarial/generated/**"
  - "tests/adversarial/*.jsonl"
